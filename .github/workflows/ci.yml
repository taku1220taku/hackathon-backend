name: Backend CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: capcycle
          MYSQL_USER: capcycle
          MYSQL_PASSWORD: capcycle
          MYSQL_ROOT_PASSWORD: capcycle-root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ucapcycle -pcapcycle"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      TEST_DATABASE_URL: "capcycle:capcycle@tcp(127.0.0.1:3306)/capcycle?parseTime=true&multiStatements=true&charset=utf8mb4,utf8"
      MIGRATION_FILE: "../../migrations/001_init.sql"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - run: go test ./...

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t capcycle-api:test -f Dockerfile .
